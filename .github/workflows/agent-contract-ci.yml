name: Agent Contract CI

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run CI gate via Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s \
            -X POST "${SUPABASE_URL}/rest/v1/rpc/fn_ci_gate_agent_contract" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Content-Profile: ops" \
            -H "Accept-Profile: ops" \
            -d '{"p_contract_id": null}')

          echo "Response: $RESPONSE"

          CI_STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ci_status','FAIL'))" 2>/dev/null || echo "FAIL")

          if [ "$CI_STATUS" = "PASS" ]; then
            echo "✅ Agent Contract CI: PASS"
          else
            echo "❌ Agent Contract CI: FAIL — $CI_STATUS — $RESPONSE"
            exit 1
          fi
