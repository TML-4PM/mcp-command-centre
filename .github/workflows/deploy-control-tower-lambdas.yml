name: Deploy Control Tower Lambdas

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::140548542136:role/troy-lambda-deployer-role
          aws-region: ap-southeast-2

      - name: Package and deploy
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          PACK="bridge_runner/control_tower_eventbridge_autofix/lambdas"
          REGION="ap-southeast-2"
          ACCOUNT="140548542136"
          ROLE_ARN="arn:aws:iam::${ACCOUNT}:role/troy-lambda-deployer-role"
          SB_URL="https://lzfgigiyqpuuxslsygjt.supabase.co"
          EB="t4h-control-tower"

          declare -A LAMBDAS
          LAMBDAS["t4h-site-scan-launcher"]="t4h_site_scan_launcher"
          LAMBDAS["t4h-autofix-router"]="t4h_autofix_router"
          LAMBDAS["t4h-autofix-health-refresh"]="t4h_autofix_health_refresh"
          LAMBDAS["t4h-autofix-reality-recalc"]="t4h_autofix_reality_recalc"

          for FN_NAME in "${!LAMBDAS[@]}"; do
            MODULE="${LAMBDAS[$FN_NAME]}"
            echo "=== $FN_NAME ==="
            mkdir -p /tmp/pkg
            cp "${PACK}/${MODULE}.py" /tmp/pkg/lambda_function.py
            cp "${PACK}/shared_events.py" /tmp/pkg/shared_events.py
            cd /tmp/pkg && zip -q /tmp/${FN_NAME}.zip . && cd -

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY] skip deploy $FN_NAME"
              rm -rf /tmp/pkg
              continue
            fi

            EXISTS=$(aws lambda get-function --function-name "$FN_NAME" \
              --region "$REGION" --query 'Configuration.FunctionName' \
              --output text 2>/dev/null || echo "")

            ENV_VARS="Variables={SUPABASE_URL=${SB_URL},SUPABASE_SERVICE_ROLE_KEY=${SB_KEY},EVENT_BUS_NAME=${EB}}"

            if [ -z "$EXISTS" ]; then
              aws lambda create-function \
                --function-name "$FN_NAME" \
                --runtime python3.11 \
                --role "$ROLE_ARN" \
                --handler lambda_function.lambda_handler \
                --zip-file "fileb:///tmp/${FN_NAME}.zip" \
                --timeout 60 \
                --memory-size 256 \
                --environment "$ENV_VARS" \
                --tags "project=control-tower,is_rd=true,project_code=CONTROL_TOWER" \
                --region "$REGION" \
                --output json | jq '{FunctionName,State}'
            else
              aws lambda update-function-code \
                --function-name "$FN_NAME" \
                --zip-file "fileb:///tmp/${FN_NAME}.zip" \
                --region "$REGION" --output json | jq '{FunctionName,CodeSize}'
              sleep 5
              aws lambda update-function-configuration \
                --function-name "$FN_NAME" \
                --handler lambda_function.lambda_handler \
                --timeout 60 --memory-size 256 \
                --environment "$ENV_VARS" \
                --region "$REGION" --output json | jq '{FunctionName,State}'
            fi
            echo "DEPLOYED: $FN_NAME"
            rm -rf /tmp/pkg
            sleep 2
          done

      - name: Wire EventBridge permissions
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          REGION="ap-southeast-2"
          ACCOUNT="140548542136"
          TS=$(date +%s)
          BUS_ARN="arn:aws:events:${REGION}:${ACCOUNT}:event-bus/t4h-control-tower"
          SCHED_ARN="arn:aws:scheduler:${REGION}:${ACCOUNT}:schedule/default/t4h-site-scan-hourly"

          for FN in t4h-autofix-router t4h-autofix-health-refresh t4h-autofix-reality-recalc; do
            aws lambda add-permission \
              --function-name "$FN" \
              --statement-id "eb-${TS}" \
              --action lambda:InvokeFunction \
              --principal events.amazonaws.com \
              --source-arn "$BUS_ARN" \
              --region "$REGION" 2>/dev/null && echo "perm set: $FN" || echo "perm exists: $FN"
          done

          aws lambda add-permission \
            --function-name t4h-site-scan-launcher \
            --statement-id "sched-${TS}" \
            --action lambda:InvokeFunction \
            --principal scheduler.amazonaws.com \
            --source-arn "$SCHED_ARN" \
            --region "$REGION" 2>/dev/null && echo "scheduler perm set" || echo "scheduler perm exists"

          echo "Permissions done"
      - name: Fix IAM bridge invoke allowlist
        run: |
          aws iam put-role-policy \
            --role-name lambda-execution-role \
            --policy-name bridge-invoke-allowlist \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"lambda:InvokeFunction","Resource":["arn:aws:lambda:ap-southeast-2:140548542136:function:troy-ec2-manager","arn:aws:lambda:ap-southeast-2:140548542136:function:troy-cfn-deployer","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-distribution","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-reading","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-receiving","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-research","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-task-executor","arn:aws:lambda:ap-southeast-2:140548542136:function:bridge-runner-writing","arn:aws:lambda:ap-southeast-2:140548542136:function:comms-morning-briefing","arn:aws:lambda:ap-southeast-2:140548542136:function:holo-morning-brief"]}]}' \
            --region ap-southeast-2 && echo "IAM DONE"

      - name: Deploy troy-bridge-runner
        if: github.event.inputs.dry_run != 'true'
        run: |
          cat > /tmp/tbr.yaml << 'EOF'
          AWSTemplateFormatVersion: '2010-09-09'
          Resources:
            BridgeRunner:
              Type: AWS::Lambda::Function
              Properties:
                FunctionName: troy-bridge-runner
                Runtime: nodejs18.x
                Handler: index.handler
                Role: arn:aws:iam::140548542136:role/lambda-execution-role
                Timeout: 60
                MemorySize: 256
                Environment:
                  Variables:
                    BRIDGE_ENDPOINT: "https://zdgnab3py0.execute-api.ap-southeast-2.amazonaws.com/prod/lambda/invoke"
                    BRIDGE_API_KEY: "bk_tOH8P5WD3mxBKfICa4yI56vJhpuYOynfdf1d_GfvdK4"
                    S3_BUCKET: "troylatter-sydney-downloads"
                    S3_PREFIX: "bridge_runner/incoming/"
                    S3_DONE: "bridge_runner/processed/"
                Code:
                  ZipFile: |
                    const{S3Client,ListObjectsV2Command,GetObjectCommand,CopyObjectCommand,DeleteObjectCommand}=require('@aws-sdk/client-s3');const https=require('https');const s3=new S3Client({region:'ap-southeast-2'});const BUCKET=process.env.S3_BUCKET,PREFIX=process.env.S3_PREFIX,DONE=process.env.S3_DONE,BU=new URL(process.env.BRIDGE_ENDPOINT),BK=process.env.BRIDGE_API_KEY;function post(b){return new Promise((res,rej)=>{const d=JSON.stringify(b);const r=https.request({hostname:BU.hostname,path:BU.pathname,method:'POST',headers:{'Content-Type':'application/json','x-api-key':BK,'Content-Length':Buffer.byteLength(d)}},rsp=>{let b='';rsp.on('data',c=>b+=c);rsp.on('end',()=>res({status:rsp.statusCode,body:b}))});r.on('error',rej);r.write(d);r.end();})}async function str(s){const c=[];for await(const x of s)c.push(x);return Buffer.concat(c).toString();}exports.handler=async()=>{const list=await s3.send(new ListObjectsV2Command({Bucket:BUCKET,Prefix:PREFIX}));const files=(list.Contents||[]).filter(o=>o.Key.endsWith('.json')&&o.Key!==PREFIX);const results=[];for(const f of files){try{const obj=await s3.send(new GetObjectCommand({Bucket:BUCKET,Key:f.Key}));const task=JSON.parse(await str(obj.Body));const result=await post(task);const dest=DONE+f.Key.slice(PREFIX.length)+'.'+Date.now()+'.done';await s3.send(new CopyObjectCommand({Bucket:BUCKET,CopySource:BUCKET+'/'+f.Key,Key:dest}));await s3.send(new DeleteObjectCommand({Bucket:BUCKET,Key:f.Key}));results.push({file:f.Key,status:result.status});}catch(e){results.push({file:f.Key,error:e.message});}}return{processed:results.length,results};};
            Schedule:
              Type: AWS::Events::Rule
              Properties:
                Name: troy-bridge-runner-cron
                ScheduleExpression: rate(1 minute)
                State: ENABLED
                Targets:
                  - Id: target
                    Arn: !GetAtt BridgeRunner.Arn
            Permission:
              Type: AWS::Lambda::Permission
              Properties:
                FunctionName: !Ref BridgeRunner
                Action: lambda:InvokeFunction
                Principal: events.amazonaws.com
                SourceArn: !GetAtt Schedule.Arn
          EOF
          aws cloudformation deploy \
            --stack-name troy-bridge-runner \
            --template-file /tmp/tbr.yaml \
            --region ap-southeast-2 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
          aws cloudformation describe-stacks --stack-name troy-bridge-runner \
            --region ap-southeast-2 \
            --query 'Stacks[0].StackStatus' --output text
