name: Intel Stack On Push

on:
  push:
    branches:
      - feat/intel-stack-bridge-pack
    paths:
      - 'intel_stack/**'
      - '.github/workflows/intel_stack_on_push.yml'
  workflow_dispatch:

jobs:
  intel-stack-run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      BRIDGE_API_URL: ${{ secrets.BRIDGE_API_URL }}
      BRIDGE_API_KEY: ${{ secrets.BRIDGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: intel_stack
        run: |
          python -m pip install --upgrade pip
          pip install -r local/requirements.txt

      - name: Run Gmail sync
        working-directory: intel_stack
        run: python local/gmail_sync_live.py

      - name: Run scoring engine
        working-directory: intel_stack
        run: python local/scoring_engine.py

      - name: Run outreach planner
        working-directory: intel_stack
        run: python local/auto_outreach.py

      - name: Publish run status artifact
        uses: actions/upload-artifact@v4
        with:
          name: intel-stack-dropoff
          path: |
            intel_stack/exports/ranked_targets.csv
            intel_stack/bridge/dropoff/*.json

      - name: Commit generated outputs back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intel_stack/exports intel_stack/bridge/dropoff || true
          git diff --cached --quiet || git commit -m "chore(intel): refresh generated outputs"
          git push
