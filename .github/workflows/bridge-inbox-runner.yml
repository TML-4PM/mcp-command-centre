name: bridge-inbox-runner

on:
  push:
    branches: [main]
    paths:
      - 'bridge_runner/inbox/**'
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Inbox file to process'
        required: false
        default: ''

jobs:
  run-inbox-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ github.token }}

      - name: Detect inbox file
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.target_file }}" ]; then
            F="${{ github.event.inputs.target_file }}"
          else
            F=$(git diff --name-only HEAD~1 HEAD -- 'bridge_runner/inbox/' | grep -E '\.(md|json)$' | head -1)
          fi
          if [ -z "$F" ]; then echo "skip=true" >> $GITHUB_OUTPUT; exit 0; fi
          echo "file=$F" >> $GITHUB_OUTPUT
          echo "basename=$(basename $F .md)" >> $GITHUB_OUTPUT
          echo "Detected: $F"

      - name: Read pack to file
        if: steps.detect.outputs.skip != 'true'
        run: |
          head -c 6000 "${{ steps.detect.outputs.file }}" > /tmp/pack_content.txt
          echo "Pack size: $(wc -c < /tmp/pack_content.txt) chars"

      - name: Fetch LLM keys
        if: steps.detect.outputs.skip != 'true'
        run: python3 bridge_runner/scripts/fetch_keys.py

      - name: Call Claude
        if: steps.detect.outputs.skip != 'true'
        run: python3 bridge_runner/scripts/call_llm.py anthropic

      - name: Call GPT
        if: steps.detect.outputs.skip != 'true'
        run: python3 bridge_runner/scripts/call_llm.py openai

      - name: Call Perplexity
        if: steps.detect.outputs.skip != 'true'
        run: python3 bridge_runner/scripts/call_llm.py perplexity

      - name: Write outbox
        if: steps.detect.outputs.skip != 'true'
        run: |
          OUTDIR="bridge_runner/outbox/${{ steps.detect.outputs.basename }}"
          mkdir -p "$OUTDIR"
          cp /tmp/anthropic_response.txt "$OUTDIR/claude_response.md" 2>/dev/null || echo "NO_RESPONSE" > "$OUTDIR/claude_response.md"
          cp /tmp/openai_response.txt "$OUTDIR/gpt_response.md" 2>/dev/null || echo "NO_RESPONSE" > "$OUTDIR/gpt_response.md"
          cp /tmp/perplexity_response.txt "$OUTDIR/perplexity_response.md" 2>/dev/null || echo "NO_RESPONSE" > "$OUTDIR/perplexity_response.md"
          python3 bridge_runner/scripts/write_summary.py "$OUTDIR" "${{ steps.detect.outputs.basename }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${{ steps.detect.outputs.file }}"
          ls -la "$OUTDIR"

      - name: Commit outbox
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "bridge-runner[bot]"
          git config user.email "bridge-runner@tech4humanity.com.au"
          git add bridge_runner/outbox/
          git diff --cached --stat
          git commit -m "bridge-runner: outbox ${{ steps.detect.outputs.basename }} [run ${{ github.run_id }}]" || echo "Nothing to commit"
          git push origin main
