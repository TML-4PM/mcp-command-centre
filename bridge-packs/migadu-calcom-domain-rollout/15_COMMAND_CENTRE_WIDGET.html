<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Domain Health Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .pass { border-left: 6px solid #2ecc71; }
    .fail { border-left: 6px solid #e74c3c; }
    .title { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Domain Health (Migadu + Cal.com)</h2>
  <div id="container"></div>

  <script>
    async function load() {
      const res = await fetch('/api/domain-drift');
      const data = await res.json();
      const container = document.getElementById('container');
      container.innerHTML = '';

      data.results.forEach(d => {
        const div = document.createElement('div');
        div.className = 'card ' + (d.status === 'PASS' ? 'pass' : 'fail');
        div.innerHTML = `
          <div class="title">${d.domain}</div>
          <div>Status: ${d.status}</div>
          <div>Missing Mailboxes: ${d.missing_mailboxes.join(', ') || 'None'}</div>
          <div>Missing Aliases: ${d.missing_aliases.join(', ') || 'None'}</div>
          <div>DNS Issues: ${d.dns_failures.join(', ') || 'None'}</div>
        `;
        container.appendChild(div);
      });
    }
    load();
  </script>
</body>
</html>
